# Two services: Gemma on AMD ROCm (vLLM) + the TokenOptimizer gateway.
# Run on an AMD Developer Cloud GPU instance:  docker compose up --build
services:
  vllm-gemma:
    # vLLM ROCm image serving an OpenAI-compatible API on the AMD GPU.
    image: rocm/vllm:latest
    command: >
      python -m vllm.entrypoints.openai.api_server
      --model google/gemma-3-4b-it
      --dtype float16
      --max-model-len 8192
      --port 8000
    ports:
      - "8000:8000"
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - video
    security_opt:
      - seccomp=unconfined
    ipc: host
    environment:
      - HF_TOKEN=${HF_TOKEN}
    shm_size: "16g"

  tokenoptimizer:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "4321:4321"
    environment:
      - TOKENOPT_MODE=live
      - LOCAL_BASE_URL=http://vllm-gemma:8000/v1
      - LOCAL_MODEL=google/gemma-3-4b-it
      - FIREWORKS_API_KEY=${FIREWORKS_API_KEY}
      - REMOTE_MODEL=accounts/fireworks/models/llama-v3p1-70b-instruct
    depends_on:
      - vllm-gemma
